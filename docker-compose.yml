services:
  postgres:
    image: postgres:16
    container_name: adaptive_doc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: adaptive_doc_prep
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: adaptive_doc_qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:16433:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: adaptive_doc_redis_6380
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: adaptive_doc_minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"  # S3 API Endpoint
      - "127.0.0.1:9001:9001"  # MinIO Web Console Dashboard
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  minio_data: